// MENÚS EN CASCADA (Campo 1 / Campo 2 / Campo 3)
// Cada categoría devuelve, según la sede, una lista de acciones.
// Cada acción tiene:
//   - label:  texto en el desplegable de "¿Qué deseas hacer?"
//   - levels: selects dependientes [{ label, options }], options puede
//             ser un arreglo o una función(valoresPrevios) => arreglo
//   - prompt: función(valores) => texto del Paso 4
// Si la función devuelve null, la categoría usa el flujo normal.
// =====================================================
var CASCADES = {
  // ---------- COTIZADOR / PRECIOS (solo Santa Catalina) ----------
  cotizador: function(system) {
    if (system !== 'Santa Catalina') return null; // otras sedes: flujo normal
    var D = COTIZADOR_SC_DATA;
    var niveles = [
      { label: 'Categoría', options: Object.keys(D) },
      { label: 'Subcategoría',
        options: function(v) { return (v[0] && D[v[0]]) ? Object.keys(D[v[0]]) : []; } },
      { label: 'Descripción del artículo', searchable: true,
        options: function(v) { return (v[0] && v[1] && D[v[0]] && D[v[0]][v[1]]) ? D[v[0]][v[1]] : []; } }
    ];
    return [
      { label: 'Precio de un producto/servicio', levels: niveles,
        prompt: function(v) { return 'Cual es el precio de ' + v[2] + ' En Santa Catalina'; } }
    ];
  },

  // ---------- CHEQUEO MÉDICO ----------
  chequeo: function(system) {
    if (system === 'HM') {
      var segmentos = {
        'Medismart':   ['Adolescente', 'Hombre', 'Mujer', 'Niños'],
        'Particular':  ['Adolescente', 'Hombre', 'Mujer', 'Niños'],
        'Aseguradora': ['Hombre', 'Mujer', 'Niños'],
        'Oncosmart':   ['Hombre', 'Mujer'],
        'BAC':         ['Hombre', 'Mujer']
      };
      var tipos = Object.keys(segmentos);
      var cascadaTipoSegmento = [
        { label: 'Tipo de chequeo', options: tipos },
        { label: 'Segmento', options: function(v) { return segmentos[v[0]] || []; } }
      ];
      return [
        { label: 'Ver qué incluye el Chequeo', levels: cascadaTipoSegmento,
          prompt: function(v) { return 'Chequeos Médicos ' + system + ' ' + v[0] + ' para ' + v[1]; } },
        { label: 'Precio del Chequeo', levels: cascadaTipoSegmento,
          prompt: function(v) { return 'Chequeos Médicos ' + system + ' ' + v[0] + ' para ' + v[1] + ' Precio'; } },
        { label: 'Protocolo de Agendamiento de Chequeos Médicos por Sede',
          levels: [ { label: 'Sede', options: ['HM Lindora', 'HM Plaza Lincoln', 'HM Plaza del Sol', 'HM Quepos', 'HM Huacas', 'CMM Cariari', 'Santa Catalina', 'Aseguradora'] } ],
          prompt: function(v) { return 'Protocolo de Agendamiento para Chequeos Médicos ' + v[0]; } }
      ];
    }
    if (system === 'Santa Catalina') {
      var seg = ['Adolescente', 'Hombre', 'Mujer', 'Niños'];
      var casc = [
        { label: 'Tipo de chequeo', options: ['Particular', 'Medismart'] },
        { label: 'Segmento', options: seg }
      ];
      return [
        { label: 'Ver qué incluye el Chequeo', levels: casc,
          prompt: function(v) { return 'Chequeos Médicos HM'  + ' ' + v[0] + ' para ' + v[1]; } },
        { label: 'Precio del Chequeo', levels: casc,
          prompt: function(v) { return 'Chequeos Médicos HM'+ ' ' + v[0] + ' para ' + v[1] + ' Precio'; } }
      ];
    }
    if (system === 'Zennit') {
      var paquetes = ['Zenit MediSport Activo', 'Zenit MediSport Esencial', 'Zenit MediSport Performance'];
      return [
        { label: 'Ver qué incluye el Chequeo', levels: [ { label: 'Paquete', options: paquetes } ],
          prompt: function(v) { return 'Chequeo Médico ' + v[0] + ' que incluye'; } },
        { label: 'Precio del Chequeo', levels: [ { label: 'Paquete', options: paquetes } ],
          prompt: function(v) { return 'Chequeo Médico ' + v[0] + ' precio'; } }
      ];
    }
    return null; // Magna y LHS: flujo normal (paquete simple)
  },

  // ---------- PROMOCIONES ----------
  promociones: function(system) {

      var cvals = cact.levels.map(function(lvl, i) {
        var val = values['c' + i];
        return (val === undefined || val === '') ? ('[' + lvl.label + ']') : val;
      });
      return cact.prompt(cvals);
    }
  }

  var sys = (system === 'General') ? '' : (' en ' + system);
  function v(key) { return values[key] || ('[' + (fieldDefs[key] ? fieldDefs[key].label : key) + ']'); }

  if (catId === 'especialidades') {
    if (action === 0) {
      // Magna / Santa Catalina / Zennit / LHS: sin sub-sede en el prompt
      if (esSedeSinSubsede(system)) return 'Cuáles son los doctores de ' + v('especialidad') + ' en ' + system;
      return 'Cuáles son los doctores de ' + v('especialidad') + ' en ' + system + ' en ' + v('sede');
    }
    if (action === 1) return 'En qué sede atiende el doctor ' + v('nombreMedico') + sys;
    if (action === 2) return 'Cuál es el ' + v('tipoDato') + ' del doctor ' + v('nombreMedico') + sys;
  }
  if (catId === 'radiologia') {
    if (esHM(system)) return 'Cuáles son los RADIOLOGOS que realizan ' + v('procedimientoRadio') + ' en ' + system + ' ' + v('sede');
    return 'Cuáles son los RADIOLOGOS que realizan ' + v('procedimientoRadio') + ' en ' + system;
  }
  if (catId === 'chequeo') return 'Paquetes de Chequeo Médico ' + system + ' ' + v('tipoChequeo');
  if (catId === 'cotizador') {
    if (action === 0) return 'Precio de ' + v('producto') + sys;
    if (action === 1) return 'Cotización de ' + v('producto') + sys + ', Correo: ' + v('correo') + ', Nombre: ' + v('nombrePaciente') + ', Apellido: ' + v('apellidoPaciente') + ', Idioma: ' + v('idioma');
  }
  if (catId === 'archivos') {
    if (action === 0) return 'Ver los archivos de ' + v('carpetaArchivo') + sys;
    if (action === 1) return 'Enviar ' + v('nombreArchivo') + sys + ', Correo: ' + v('correo');
  }
  if (catId === 'autogestion') {
    var labels = ['Crear Usuario de Autogestión','Restaurar contraseña de Autogestión','Modificar correo de Autogestión','Código de validación','Links De Pago'];
    return labels[action] + ' ' + v('idPaciente');
  }
  if (catId === 'medicina_general') {
    var opts = ['Información o tabla resumen de Medicina General','Información o tabla resumen de Medicina Empresa','Información AMP'];
    return opts[action];
  }
  if (catId === 'informacion_general') {
     if (action === 0 ) return '¿Cuales son las formas de pago de ' + system + '?';
     if (action === 1 ) return '¿Cuáles son las cuentas bancarias de ' + system + '?';
     if (action === 2 ) return '¿Protocolo de devoluciones de dinero en  ' + system + '?'
  }
  if (catId === 'autogestion_tema') {
    var tema = values['temaEspecial'] || '[Tema especial]';
    var subKey = temaToSubKey(tema);
    var subVal = subKey ? values[subKey] : null;
    if (subVal && subVal !== 'Otro') return subVal;
    var libre = values['subtema'] || '[consulta]';
    return tema + ' — ' + libre;
  }
  if (catId === 'sedes') {
    if (esHM(system)) {
      if (action === 0) return 'Cual son el horario de ' + v('tipoServicioSede') + ' de ' + system + ' ' + v('sede');
      if (action === 1) return 'Medios de contacto de ' + system + ' ' + v('sede') + ' de ' + v('tipoServicioSede');
      if (action === 2) return 'Cuál es la extensión de ' + system + ' ' + v('sede') + ' de ' + v('tipoServicioSede');
      if (action === 3) return 'Cuál es la dirección de ' + system + ' ' + v('sede');
    } else {
      // Sedes que no son HM: sin sub-sede en el prompt
      if (action === 0) return 'Cual son el horario de ' + v('tipoServicioSede') + ' de ' + system;
      if (action === 1) return 'Medios de contacto de ' + system + ' de ' + v('tipoServicioSede');
      if (action === 2) return 'Cuál es la extensión de ' + system + ' de ' + v('tipoServicioSede');
      if (action === 3) return 'Cuál es la dirección de ' + system;
    }
  }
  if (catId === 'promociones') {
    if (action === 0) {
        if (system === "Laboratorios Paez") {
            return 'Promociones de Laboratorios Paez Junio' ;
        } else {
            return 'Promociones de ' + system;
        }
    }
    if (action === 1) return 'Cuáles son los horarios frío de ' + system;
}
  if (catId === 'cirugias') {
    var opts2 = ['Ver el paso paso de escalamiento de casos en Salesforce Cotizaciones De Maternidad','Cuales CIRUGÍAS NO SE REALIZA EN HM','Precio de la JORNADA DE CIRUGÍAS VESÍCULA en HM'];
    return opts2[action];
  }
  return '— Prompt no configurado —';
}

function temaToSubKey(tema) {
  var map = {
    'Asidown':'Asidown_P','Assist Card':'Assist_Card_P','Baby Spa':'Baby_Spa_P',
    'Biocenpat':'Biocenpat_P','Canales Digitales':'Canales_Digitales_P',
    'Centro Especializado de Columna':'Centro_Columna_P','Clínica LHS':'Clinica_LHS_P',
    'Medistars':'Medistars_P','Previplan':'Previplan_P','Panamá':'Panama_P','Cardiología':'Cardiologia_P'
  };
  return map[tema] || null;
}

function hoyISO(){ var d=new Date(); var m=('0'+(d.getMonth()+1)).slice(-2), day=('0'+d.getDate()).slice(-2); return d.getFullYear()+'-'+m+'-'+day; }
function formatFecha(iso){ if(!iso) return ''; var p=String(iso).split('-'); if(p.length!==3) return iso; return p[2]+'/'+p[1]+'/'+p[0]; }
function formatHora(t){ if(!t) return ''; var p=String(t).split(':'); if(p.length<2) return t; var h=parseInt(p[0],10); if(isNaN(h)) return t; var m=p[1]; var ap=h>=12?'p.m.':'a.m.'; var h12=h%12; if(h12===0)h12=12; return h12+':'+m+' '+ap; }

function selectCatComprobante(cat){
  setStep(2); markSteps(2);
  var lbl=document.getElementById('m-step2-label'); if(lbl) lbl.textContent='Paso 2 \u2014 \u00bfPara qui\u00e9n es el comprobante?';
  document.getElementById('m-system-note').classList.add('m-hidden');
  var sg=document.getElementById('m-system-group'); sg.className='m-radio-group'; sg.innerHTML='';
  [['Paciente','Paciente'],['Acompañante','Acompañante']].forEach(function(par){
    var tipo=par[0];
    var l=document.createElement('label'); l.className='m-radio-pill';
    l.innerHTML='<input type="radio" name="m-system" value="'+tipo+'"><span>'+par[1]+'</span>';
    l.onclick=function(){
      state.system=tipo;
      document.querySelectorAll('#maia-gen .m-radio-pill').forEach(function(p){p.classList.remove('selected');});
      l.classList.add('selected');
      buildComprobanteForm(cat, tipo);
    };
    sg.appendChild(l);
  });
}

function comprobanteCampos(tipo){
  var b=[{key:'fecha',label:'Fecha',type:'date'}];
  if(tipo==='Acompa\u00f1ante'){
    b.push({key:'nombreAcompanante',label:'Nombre del acompa\u00f1ante',type:'text',ph:'Nombre completo'});
    b.push({key:'cedulaAcompanante',label:'C\u00e9dula del acompa\u00f1ante',type:'text',ph:'0-0000-0000'});
    b.push({key:'nombrePaciente',label:'Nombre del paciente',type:'text',ph:'Nombre completo'});
  } else {
    b.push({key:'nombrePaciente',label:'Nombre del paciente',type:'text',ph:'Nombre completo'});
    b.push({key:'cedula',label:'C\u00e9dula del paciente',type:'text',ph:'0-0000-0000'});
  }
  b.push({key:'area',label:'\u00c1rea de atenci\u00f3n',type:'text',ph:'Area Atencion'});
  b.push({key:'horaIngreso',label:'Hora de ingreso',type:'time'});
  b.push({key:'horaEgreso',label:'Hora de egreso',type:'time'});

  return b;
}

function comprobanteField(c){
  var w=document.createElement('div'); w.className='m-field m-dynamic-field';
  w.innerHTML='<label>'+c.label+'</label>';
  var input;
  if(c.type==='select'){
    input=document.createElement('select');
    input.innerHTML='<option value="">\u2014 Selecciona \u2014</option>';
    c.options.forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;input.appendChild(op);});
    input.value=state.values[c.key]||'';
    input.onchange=function(){state.values[c.key]=input.value; renderComprobantePreview();};
  } else {
    input=document.createElement('input'); input.type=c.type;
    if(c.ph) input.placeholder=c.ph;
    if(state.values[c.key]) input.value=state.values[c.key];
    input.oninput=function(){state.values[c.key]=input.value; renderComprobantePreview();};
  }
  w.appendChild(input); return w;
}

function buildComprobanteForm(cat, tipo){
  setStep(3); markSteps(3);
  if(!state.values) state.values={};
  if(!state.values.fecha) state.values.fecha=hoyISO();
  var c=document.getElementById('m-fields-container'); c.innerHTML='';
  comprobanteCampos(tipo).forEach(function(cp){ c.appendChild(comprobanteField(cp)); });
  var prev=document.createElement('div');
  prev.innerHTML='<div class="m-comp-prev-label">Vista previa</div><div id="m-comp-preview" class="m-comp-preview"></div>';
  c.appendChild(prev);
  var row=document.createElement('div'); row.className='m-comp-btnrow';
  row.innerHTML='<button id="m-comp-export" class="m-comp-export-btn"><span>\u2B07\uFE0F</span> Exportar a PDF</button>';
  c.appendChild(row);
  document.getElementById('m-comp-export').onclick=exportarComprobantePDF;
  renderComprobantePreview();
}

function renderComprobantePreview(){
  var box=document.getElementById('m-comp-preview'); if(!box) return;
  var tipo=state.system, v=state.values||{};
  var nombre=(tipo==='Acompa\u00f1ante'? v.nombreAcompanante : v.nombrePaciente) || '__________';
  var ced=(tipo==='Acompa\u00f1ante'? v.cedulaAcompanante : v.cedula) || '__________';
  var area=v.area || '__________';
  var cuerpo;
  if(tipo==='Acompa\u00f1ante'){
    cuerpo='Se present\u00f3 al Hospital Metropolitano como acompa\u00f1ante del (a) paciente <b>'+vipEsc((v.nombrePaciente||'__________').toUpperCase())+'</b>, en el \u00e1rea de <b>'+vipEsc(area)+'</b>.';
  } else {
    cuerpo='Se present\u00f3 al Hospital Metropolitano en el \u00e1rea de <b>'+vipEsc(area)+'</b>.';
  }
  box.innerHTML=
    '<div class="m-comp-doc">'+

function loadJsPDF(cb){
  if(window.jspdf && window.jspdf.jsPDF){ cb(true); return; }
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  s.onload=function(){ cb(!!(window.jspdf && window.jspdf.jsPDF)); };
  s.onerror=function(){ cb(false); };
  document.head.appendChild(s);
}

function exportarComprobantePDF(){
  var tipo=state.system, v=state.values||{};
  var nombre=(tipo==='Acompa\u00f1ante'? v.nombreAcompanante : v.nombrePaciente);
  var falta=[];
  if(!nombre) falta.push('nombre');
  if(!v.area) falta.push('\u00e1rea');
  if(!v.horaIngreso) falta.push('hora de ingreso');
  if(!v.horaEgreso) falta.push('hora de egreso');
  if(falta.length){ alert('Completa al menos: '+falta.join(', ')+'.'); return; }
  var btn=document.getElementById('m-comp-export'); if(btn){ btn.disabled=true; btn.style.opacity='0.6'; }
  loadJsPDF(function(ok){
    if(btn){ btn.disabled=false; btn.style.opacity='1'; }
    if(!ok){ alert('No se pudo cargar el generador de PDF. Verifica la conexi\u00f3n a internet.'); return; }
    try{
      var doc=comprobanteDoc(tipo,v);
      var safe=String(nombre||'comprobante').replace(/[^\w\s\u00C0-\u017F-]/g,'').trim().replace(/\s+/g,'_');
      doc.save('Comprobante_'+tipo+'_'+safe+'.pdf');
    }catch(e){ alert('Error al generar el PDF: '+e.message); }
  });
}

function selectCat(catId) {
  state = { catId: catId, action: null, system: null, values: {}, cascadeActions: null };

  document.querySelectorAll('#maia-gen .m-cat-btn').forEach(function(b) {
    b.classList.toggle('selected', b.dataset.catId === catId);
  });

  var cat = categories.find(function(c) { return c.id === catId; });

  // Categoría especial: Centro Médico MAE LEWIS (buscador VIP, sin pasos 3 y 4)
  if (cat.mode === 'vip') { buildVipSearch(cat); return; }
  if (cat.mode === 'comprobante') { selectCatComprobante(cat); return; }

  var step2lbl = document.getElementById('m-step2-label');
  if (step2lbl) step2lbl.textContent = 'Paso 2 — ¿A qué centro pertenece?';
  setStep(2);

  var sg = document.getElementById('m-system-group');
  sg.className = 'm-radio-group';
  sg.innerHTML = '';
  cat.systems.forEach(function(sys) {
    var lbl = document.createElement('label');
    lbl.className = 'm-radio-pill';
    lbl.innerHTML = '<input type="radio" name="m-system" value="' + sys + '"><span>' + sys + '</span>';
    lbl.onclick = function() {
      state.system = sys;
      document.querySelectorAll('#maia-gen .m-radio-pill').forEach(function(p) { p.classList.remove('selected'); });
      lbl.classList.add('selected');
      buildStep3(cat);
    };
    sg.appendChild(lbl);
  });

  if (cat.systems.length === 1) {
    state.system = cat.systems[0];
    sg.querySelector('label').classList.add('selected');
    buildStep3(cat);
  }

  var noteEl = document.getElementById('m-system-note');
  var noteText = document.getElementById('m-system-note-text');
  if (cat.note) {
    noteEl.classList.remove('m-hidden');
    noteText.textContent = cat.note;
  } else {
    noteEl.classList.add('m-hidden');
  }

  markSteps(2);
}

// Determina si una acción debe mostrarse según la sede seleccionada
function isActionVisible(cat, i, system) {
  // Especialidades: "Sede donde atiende un doctor" (1) se oculta en sedes de una sola ubicación
  if (cat.id === 'especialidades' && i === 1 && esSedeSinSubsede(system)) return false;
  // Cotizador: "Enviar cotización por correo" (1) solo disponible en HM
  if (cat.id === 'cotizador' && i === 1 && !esHM(system)) return false;
  // Promociones: "Horarios frío" (1) solo disponible en HM
  if (cat.id === 'promociones' && i === 1 && !esHM(system)) return false;
  return true;
}

// Devuelve la etiqueta de la acción, ajustada según la sede seleccionada
function actionLabel(cat, i, system) {
  // Sedes que no son HM: se quita la palabra "sede" de las etiquetas
  if (cat.id === 'sedes' && !esHM(system)) {
    var alt = ['Horario', 'Contacto', 'Extensión', 'Dirección'];
    if (alt[i]) return alt[i];
  }
  return cat.actions[i].label;
}

function buildStep3(cat) {
  setStep(3);
  var container = document.getElementById('m-fields-container');
  container.innerHTML = '';

  // ¿Categoría con menús en cascada para esta sede?
  var cascadeActions = CASCADES[cat.id] ? CASCADES[cat.id](state.system) : null;
  if (cascadeActions) {
    state.cascadeActions = cascadeActions;
    buildCascadeStep3(cat, cascadeActions, container);
    markSteps(3);
    return;
  }
  state.cascadeActions = null; // flujo normal

  // Acciones visibles según la sede seleccionada (conservando su índice original)
  var visibleActions = [];
  cat.actions.forEach(function(a, i) {
    if (isActionVisible(cat, i, state.system)) visibleActions.push(i);
  });

  if (visibleActions.length > 1) {
    var f = document.createElement('div');
    f.className = 'm-field';
    f.innerHTML = '<label>¿Qué deseas hacer?</label>';
    var sel = document.createElement('select');
    sel.innerHTML = '<option value="">— Selecciona una acción —</option>';
    visibleActions.forEach(function(i) {
      var opt = document.createElement('option');
      opt.value = i; // índice original — buildPrompt depende de él
      opt.textContent = actionLabel(cat, i, state.system);
      sel.appendChild(opt);
    });
    sel.onchange = function() {
      state.action = parseInt(sel.value);
      state.values = {};
      renderDynamicFields(cat, state.action);
    };
    f.appendChild(sel);
    container.appendChild(f);
  } else {
    state.action = visibleActions.length ? visibleActions[0] : 0;
    renderDynamicFields(cat, state.action);
  }

  markSteps(3);
}

// =====================================================
// RENDER EN CASCADA (Campo 1 / Campo 2 / Campo 3)
// =====================================================
function buildCascadeStep3(cat, actions, container) {
  if (actions.length > 1) {
    var f = document.createElement('div');
    f.className = 'm-field';
    f.innerHTML = '<label>¿Qué deseas hacer?</label>';
    var sel = document.createElement('select');
    sel.innerHTML = '<option value="">— Selecciona una acción —</option>';
    actions.forEach(function(a, i) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = a.label;
      sel.appendChild(opt);
    });
    sel.onchange = function() {
      state.action = parseInt(sel.value);
      renderCascadeLevels(container, actions[state.action]);
    };
    f.appendChild(sel);
    container.appendChild(f);
  } else {
    state.action = 0;
    renderCascadeLevels(container, actions[0]);
  }
}

function renderCascadeLevels(container, action) {
  document.querySelectorAll('#maia-gen .m-cascade-field').forEach(function(el) { el.remove(); });
  state.values = {};
  if (action.levels && action.levels.length > 0) {
    renderCascadeLevel(container, action, 0);
  }
  generatePrompt();
}

function cascadeVals() {
  var v = [];
  for (var i = 0; i < 6; i++) {
    if (state.values['c' + i] !== undefined) v[i] = state.values['c' + i];
  }
  return v;
}

function renderCascadeLevel(container, action, idx) {
  var level = action.levels[idx];
  if (!level) return;
  var opts = (typeof level.options === 'function') ? level.options(cascadeVals()) : level.options;

  var wrapper = document.createElement('div');
  wrapper.className = 'm-field m-dynamic-field m-cascade-field';
  wrapper.dataset.level = idx;
  wrapper.innerHTML = '<label>' + level.label + '</label>';

  // Lógica común al elegir un valor en este nivel
  function onPick(value) {
    state.values['c' + idx] = value;
    // eliminar campos de niveles más profundos y sus valores
    document.querySelectorAll('#maia-gen .m-cascade-field').forEach(function(el) {
      if (parseInt(el.dataset.level) > idx) el.remove();
    });
    for (var k = idx + 1; k < 6; k++) { delete state.values['c' + k]; }
    // mostrar el siguiente nivel si existe y se eligió un valor
    if (value && action.levels[idx + 1]) {
      renderCascadeLevel(container, action, idx + 1);
    }
    generatePrompt();
  }

  if (level.searchable) {
    // Nivel con buscador de coincidencias (lista larga: descripción del artículo)
    buildSearchableSelect(wrapper, opts, level.label, onPick);
  } else {
    var input = document.createElement('select');
    input.innerHTML = '<option value="">— Selecciona —</option>';
    opts.forEach(function(o) {
      var op = document.createElement('option');
      op.value = o; op.textContent = o;
      input.appendChild(op);
    });
    input.onchange = function() { onPick(input.value); };
    wrapper.appendChild(input);
  }

  container.appendChild(wrapper);
}

// Quita acentos y pasa a minúsculas para búsqueda flexible
function mNormTxt(s) {
  return s.toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Combobox con buscador de coincidencias
function buildSearchableSelect(wrapper, opts, labelTxt, onPick) {
  var combo = document.createElement('div');
  combo.className = 'm-search-combo';

  var input = document.createElement('input');
  input.type = 'text';
  input.setAttribute('autocomplete', 'off');
  input.placeholder = '🔎 Buscar ' + labelTxt.toLowerCase() + '...';

  var list = document.createElement('div');
  list.className = 'm-search-list m-hidden';

  var count = document.createElement('div');
  count.className = 'm-search-count m-hidden';

  var selected = false;

  function render(filter) {
    list.innerHTML = '';
    var f = mNormTxt(filter);
    var matches = opts.filter(function(o) { return mNormTxt(o).indexOf(f) !== -1; });
    var shown = matches.slice(0, 50);
    if (matches.length === 0) {
      var e = document.createElement('div');
      e.className = 'm-search-empty';
      e.textContent = 'Sin coincidencias';
      list.appendChild(e);
    } else {
      shown.forEach(function(o) {
        var it = document.createElement('div');
        it.className = 'm-search-item';
        it.textContent = o;
        it.onmousedown = function(ev) { // mousedown: evita perder el foco antes del click
          ev.preventDefault();
          input.value = o;
          selected = true;
          hide();
          onPick(o);
        };
        list.appendChild(it);
      });
    }
    count.textContent = matches.length + ' resultado(s)' + (matches.length > 50 ? ' — mostrando 50, refina la búsqueda' : '');
    count.classList.toggle('m-hidden', matches.length === 0 && filter === '');
  }

  function show() { render(input.value); list.classList.remove('m-hidden'); }
  function hide() { list.classList.add('m-hidden'); }

  input.onfocus = function() { show(); };
  input.oninput = function() {
    if (selected) { selected = false; onPick(''); } // cambió tras elegir -> resetea selección
    show();
  };
  input.onblur = function() { setTimeout(hide, 150); }; // permite registrar el click

  combo.appendChild(input);
  combo.appendChild(list);
  wrapper.appendChild(combo);
  wrapper.appendChild(count);
}

function renderDynamicFields(cat, actionIdx) {
  document.querySelectorAll('#maia-gen .m-dynamic-field').forEach(function(el) { el.remove(); });
  var container = document.getElementById('m-fields-container');
  var fields = (cat.actions[actionIdx] && cat.actions[actionIdx].fields) ? cat.actions[actionIdx].fields.slice() : [];

  // Especialidades + sedes de una sola ubicación (Magna, Santa Catalina, Zennit, LHS):
  // en "Ver doctores por especialidad" (acción 0) se quita el campo "Sede".
  if (cat.id === 'especialidades' && actionIdx === 0 && esSedeSinSubsede(state.system)) {
    fields = fields.filter(function(f) { return f !== 'sede'; });
  }

  // Radiología: el campo "Sede" solo aparece en HM.
  if (cat.id === 'radiologia' && !esHM(state.system)) {
    fields = fields.filter(function(f) { return f !== 'sede'; });
  }

  // Sedes / Horarios / Contacto: el campo "Sede" solo aparece en HM.
  if (cat.id === 'sedes' && !esHM(state.system)) {
    fields = fields.filter(function(f) { return f !== 'sede'; });
  }

  fields.forEach(function(fieldKey) {
    var def = fieldDefs[fieldKey];
    if (!def) return;
    var wrapper = document.createElement('div');
    wrapper.className = 'm-field m-dynamic-field';
    wrapper.innerHTML = '<label>' + def.label + '</label>';

    var input;
    if (def.type === 'select') {
      input = document.createElement('select');
      input.innerHTML = '<option value="">— Selecciona —</option>';
      var opts = def.options;
      // Especialidades + sedes de una sola ubicación: en "Precio / horario / sede de un doctor"
      // (acción 2) se quita la opción "sede" del campo "Qué información necesitas".
      if (fieldKey === 'tipoDato' && cat.id === 'especialidades' && actionIdx === 2 && esSedeSinSubsede(state.system)) {
        opts = opts.filter(function(o) { return o !== 'sede'; });
      }
      opts.forEach(function(opt) {
        var o = document.createElement('option');
        o.value = opt; o.textContent = opt;
        input.appendChild(o);
      });
    } else {
      input = document.createElement('input');
      input.type = 'text';
      input.placeholder = def.placeholder || '';
    }

    if (fieldKey === 'temaEspecial') {
      input.onchange = function() {
        state.values[fieldKey] = input.value.trim();
        document.querySelectorAll('#maia-gen .m-subtheme-field').forEach(function(el) { el.remove(); });
        var subKey = temaToSubKey(input.value);
        if (subKey && fieldDefs[subKey]) injectSubthemeField(container, subKey);
        generatePrompt();
      };
    } else {
      input.oninput = input.onchange = function() {
        state.values[fieldKey] = input.value.trim();
        generatePrompt();
      };
    }

    wrapper.appendChild(input);
    container.appendChild(wrapper);
  });

  generatePrompt();
}

function injectSubthemeField(container, subKey) {
  var def = fieldDefs[subKey];
  if (!def) return;
  var wrapper = document.createElement('div');
  wrapper.className = 'm-field m-dynamic-field m-subtheme-field';
  wrapper.innerHTML = '<label>' + def.label + '</label>';
  var input = document.createElement('select');
  input.innerHTML = '<option value="">— Selecciona —</option>';
  def.options.forEach(function(opt) {
    var o = document.createElement('option');
    o.value = opt; o.textContent = opt;
    input.appendChild(o);
  });
  input.onchange = function() {
    state.values[subKey] = input.value;
    document.querySelectorAll('#maia-gen .m-otro-field').forEach(function(el) { el.remove(); });
    if (input.value === 'Otro') {
      injectOtroField(container);
    } else {
      delete state.values['subtema'];
    }
    generatePrompt();
  };
  wrapper.appendChild(input);
  container.appendChild(wrapper);
}

function injectOtroField(container) {
  var def = fieldDefs['subtema'];
  var wrapper = document.createElement('div');
  wrapper.className = 'm-field m-dynamic-field m-subtheme-field m-otro-field';
  wrapper.innerHTML = '<label>' + def.label + '</label>';
  var input = document.createElement('input');
  input.type = 'text';
  input.placeholder = def.placeholder || '';
  input.oninput = function() {
    state.values['subtema'] = input.value.trim();
    generatePrompt();
  };
  wrapper.appendChild(input);
  container.appendChild(wrapper);
}

function generatePrompt() {
  var cat = categories.find(function(c) { return c.id === state.catId; });
  if (!cat || state.action === null || !state.system) return;
  var promptRaw = buildPrompt(state.catId, state.action, state.system, state.values);
  var highlighted = promptRaw
    .replace(/\[([^\]]+)\]/g, '<span class="val">[$1]</span>')
    .replace(/\b(HM|MS|RADIOLOGOS|INFO HM|INFO MS|LHS|asidown|Assist Card|Medismart)\b/g, '<span class="kw">$1</span>');
  document.getElementById('m-prompt-output').innerHTML = highlighted;
  setStep(4);
  markSteps(4);
}

// =====================================================
// UI HELPERS
// =====================================================
function setStep(n) {
  ['m-step1','m-step2','m-step3','m-step4'].forEach(function(id, i) {
    var el = document.getElementById(id);
    if (i + 1 <= n) el.classList.remove('m-hidden');
    else el.classList.add('m-hidden');
  });
}

function markSteps(activeStep) {
  [1,2,3,4].forEach(function(n) {
    var dot = document.getElementById('m-step' + n + '-dot');
    dot.classList.remove('active','done');
    if (n < activeStep) dot.classList.add('done');
    else if (n === activeStep) dot.classList.add('active');
  });
}

// =====================================================
// COPY — con fallback para iframes
// =====================================================
function copyPrompt() {
  var out = document.getElementById('m-prompt-output');
  var text = out.innerText;

  var btn = document.getElementById('m-copy-btn');

  function onSuccess() {
    btn.innerHTML = '<span>✅</span> ¡Copiado!';
    btn.classList.add('copied');
    showToast();
    setTimeout(function() {
      btn.innerHTML = '<span>📋</span> Copiar prompt';
      btn.classList.remove('copied');
    }, 2000);
  }

  // Intento 1: navigator.clipboard (moderno, requiere HTTPS y permisos)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(function() {
      fallbackCopy(text, onSuccess);
    });
  } else {
    fallbackCopy(text, onSuccess);
  }
}

// Fallback: execCommand (funciona dentro de iframes sin permiso clipboard)
function fallbackCopy(text, onSuccess) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch(e) {
    // Si todo falla, seleccionar el texto para que el usuario copie manualmente
    var out = document.getElementById('m-prompt-output');
    var range = document.createRange();
    range.selectNodeContents(out);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    showToast('Seleccionado — presiona Ctrl+C para copiar');
  }
  document.body.removeChild(ta);
}

function showToast(msg) {
  var t = document.getElementById('m-toast');
  t.textContent = msg || '✅ ¡Prompt copiado!';
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function resetAll() {
  state = { catId: null, action: null, system: null, values: {} };
  document.querySelectorAll('#maia-gen .m-cat-btn').forEach(function(b) { b.classList.remove('selected'); });
  setStep(1);
  markSteps(1);
  document.getElementById('m-fields-container').innerHTML = '';
}

// =====================================================
// START — espera a que el DOM esté listo
// =====================================================
function maiaStart() {
  // Verifica que el contenedor ya existe en el DOM
  if (document.getElementById('m-cat-grid')) {
    init();
  } else {
    // Si aún no existe, reintenta cada 50ms hasta que aparezca
    setTimeout(maiaStart, 50);
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', maiaStart);
} else {
  // DOM ya está listo (script cargado después del HTML)
  maiaStart();
}

})(); // IIFE — no contamina el scope global del CMS
</script>
